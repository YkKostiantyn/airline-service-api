name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      # Додаємо Redis для правильної роботи вебсокетів (Daphne/Channels)
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      env:
        SECRET_KEY: "dummy-secret-key-for-testing"
        DEBUG: "True"
        
        DB_NAME: "test_db"
        DB_USER: "test_user"
        DB_PASSWORD: "test_password"
        DB_HOST: "localhost"
        DB_PORT: "5432"
        REDIS_URL: "redis://localhost:6379"
        
        GEMINI_API_KEY: "dummy-api-key"
        STRIPE_SECRET_KEY: "dummy-stripe-secret"
        STRIPE_PUBLIC_KEY: "dummy-stripe-public"
        STRIPE_WEBHOOK_SECRET: "dummy-stripe-webhook"
        
      run: |
        python manage.py test